{% extends 'base.html' %}
{% block auth_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="fas fa-shield-halved"></i>
      <h2>Create Account</h2>
      <p>Join PassGuard Pro today</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="Enter email" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password1" class="form-control" placeholder="Create password" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password2" class="form-control" placeholder="Repeat password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="fas fa-user-plus me-2"></i>Create Account
      </button>
    </form>

    <p class="text-center mt-3 text-muted">
      Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
